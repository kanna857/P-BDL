version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: rbac_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rbac_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rbac_secure_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-rbac_governance_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: rbac_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@entra-rbac.com
      PGADMIN_DEFAULT_PASSWORD: AdminPass123!
    ports:
      - "5050:80"
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rbac_backend
    restart: always
    volumes:
      - ./backend:/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rbac_admin}:${POSTGRES_PASSWORD:-rbac_secure_password_2026}@db:5432/${POSTGRES_DB:-rbac_governance_db}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rbac_frontend
    restart: always
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
